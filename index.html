<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deus X Defense &middot; Investor Portal</title>
  <link rel="canonical" href="https://investor.deusxdefense.com/" />
  <meta property="og:url" content="https://investor.deusxdefense.com/" />
  <script>
    (function() {
      const CANONICAL_ORIGIN = "https://investor.deusxdefense.com";
      if (/\.railway\.app$/i.test(window.location.hostname)) {
        window.location.replace(
          CANONICAL_ORIGIN +
          window.location.pathname +
          window.location.search +
          window.location.hash
        );
      }
    })();
  </script>
  <style>
    :root {
      --bg: #0b0d10;
      --panel: #14181d;
      --border: #232a32;
      --text: #e8ecf1;
      --muted: #8a93a0;
      --accent: #C8102E;
      --accent-bg: #1a1f26;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    header {
      flex: 0 0 auto;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px 4px;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .brand img.brand-logo {
      height: 22px;
      width: auto;
      display: block;
    }
    .brand strong { color: var(--text); font-weight: 700; }
    .brand .brand-x { color: #C8102E; font-weight: 700; }
    nav.tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      padding: 8px 12px 0;
    }
    .tab {
      appearance: none;
      background: transparent;
      color: var(--muted);
      border: 1px solid transparent;
      border-bottom: none;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-top-left-radius: 6px;
      border-top-right-radius: 6px;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
    }
    .tab:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .tab.active {
      color: var(--accent);
      background: var(--accent-bg);
      border-color: var(--border);
      position: relative;
      top: 1px;
    }
    main {
      flex: 1 1 auto;
      position: relative;
      background: var(--bg);
    }
    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
      display: none;
    }
    iframe.active { display: block; }
    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 14px;
      pointer-events: none;
    }
    /* ── Mobile portal shell (≤720px) ──
       Tabs become a horizontally-scrollable strip so all 8 stay on a
       single row instead of stacking 3-deep and crowding the iframe.
       The brand line shrinks and the iframe gets the reclaimed space. */
    @media (max-width: 720px) {
      .brand {
        padding: 8px 14px 2px;
        font-size: 11px;
        letter-spacing: 0.08em;
        gap: 8px;
        flex-wrap: nowrap;
        overflow: hidden;
        white-space: nowrap;
      }
      .brand img.brand-logo { height: 18px; }
      .brand .brand-tag { display: none; }
      nav.tabs {
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        padding: 6px 8px 0;
        scrollbar-width: none;
      }
      nav.tabs::-webkit-scrollbar { display: none; }
      .tab {
        padding: 8px 12px;
        font-size: 12px;
        white-space: nowrap;
        flex: 0 0 auto;
      }
    }
    @media (max-width: 480px) {
      .brand { padding: 6px 12px 0; font-size: 10px; gap: 6px; }
      .brand img.brand-logo { height: 16px; }
      .tab { padding: 7px 10px; font-size: 11px; }
    }
    /* Sign-in gate — "Threats Don't Wait" format */
    #gate {
      position: fixed;
      inset: 0;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    #gate .hero {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #gate .hero iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
      pointer-events: auto;
    }
    /* Vignette to suppress any tagline/subtext rendered inside the hero iframe */
    #gate .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0) 50%, rgba(0,0,0,0.95) 65%, #000 72%),
        radial-gradient(ellipse at center, rgba(0,0,0,0) 30%, rgba(0,0,0,0.6) 100%);
    }
    #gate .hero-title {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 6vh;
      z-index: 1;
      text-align: center;
      font-family: Impact, "Haettenschweiler", "Arial Narrow Bold", sans-serif;
      font-size: clamp(36px, 7vw, 88px);
      letter-spacing: -1px;
      color: #FFFFFF;
      text-shadow: 0 2px 24px rgba(0,0,0,0.8);
      pointer-events: none;
      line-height: 1;
    }
    #gate .hero-logo {
      position: absolute;
      left: 0;
      right: 0;
      top: 5vh;
      z-index: 1;
      text-align: center;
      pointer-events: none;
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      letter-spacing: 0.42em;
      font-weight: 600;
      font-size: clamp(12px, 1.4vw, 16px);
      text-transform: uppercase;
      text-shadow: 0 2px 12px rgba(0,0,0,0.8);
    }
    #gate .hero-logo .mark {
      display: inline-flex;
      align-items: center;
      gap: 0.6em;
    }
    #gate .hero-logo .x {
      color: #C8102E;
      font-family: Impact, "Haettenschweiler", "Arial Narrow Bold", sans-serif;
      font-size: 1.5em;
      letter-spacing: 0;
      line-height: 1;
      transform: translateY(-1px);
    }
    #gate .panel {
      pointer-events: auto;
    }
    #gate .panel {
      position: relative;
      z-index: 2;
      width: min(360px, 90vw);
      padding: 22px 22px 20px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(200, 16, 46, 0.45);
      border-radius: 4px;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }
    #gate .eyebrow {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #FF506E;
      text-align: center;
      margin: 0 0 10px;
    }
    #gate .title {
      font-family: Impact, "Haettenschweiler", "Arial Narrow Bold", sans-serif;
      font-size: 28px;
      letter-spacing: -0.5px;
      color: #FFFFFF;
      text-align: center;
      margin: 0 0 18px;
      line-height: 1;
    }
    #gate label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #aaaaaa;
      margin: 0 0 6px;
    }
    #gate input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      background: #000000;
      color: #FFFFFF;
      border: 1px solid #3a3a3a;
      border-radius: 2px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    #gate input[type="password"]:focus { border-color: #C8102E; }
    #gate button {
      margin-top: 12px;
      width: 100%;
      padding: 11px 12px;
      background: #C8102E;
      color: #FFFFFF;
      border: 0;
      border-radius: 2px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
    }
    #gate button:hover { background: #E01933; }
    #gate .error {
      margin-top: 10px;
      min-height: 16px;
      font-size: 12px;
      color: #FF506E;
      text-align: center;
    }
  </style>
<!-- DXD-FONT-STANDARDIZATION -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700;800&family=Tomorrow:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&display=swap" rel="stylesheet">
<style id="dxd-font-standardization">
  :root {
    --dxd-font-display: "Tomorrow", "Inter Tight", system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --dxd-font-body:    "Inter Tight", "Tomorrow", system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

    /* Standardized type scale (anchored to team page hero) */
    --dxd-h1-size: clamp(36px, 5.2vw, 76px);
    --dxd-h2-size: clamp(28px, 3.4vw, 48px);
    --dxd-h3-size: clamp(20px, 2vw, 28px);
    --dxd-h4-size: clamp(16px, 1.4vw, 20px);
    --dxd-body-size: clamp(15px, 1.05vw, 17px);
    --dxd-small-size: 13px;
    --dxd-eyebrow-size: 12px;

    --dxd-h1-weight: 400;
    --dxd-h2-weight: 400;
    --dxd-h3-weight: 500;
    --dxd-h4-weight: 600;
    --dxd-body-weight: 400;

    --dxd-h1-line: 0.98;
    --dxd-h2-line: 1.05;
    --dxd-h3-line: 1.15;
    --dxd-body-line: 1.55;

    --dxd-tracking-display: -0.02em;
    --dxd-tracking-eyebrow: 0.18em;
  }

  html, body, p, li, td, th, input, textarea, select, button, label,
  blockquote, figcaption, dd, dt {
    font-family: var(--dxd-font-body) !important;
    font-size: var(--dxd-body-size);
    line-height: var(--dxd-body-line);
  }

  h1, h2, h3, h4, h5, h6,
  .display, .headline, .hero-title, .section-title, .eyebrow, .nav-cta,
  .tab, .brand, .logo, .card-role {
    font-family: var(--dxd-font-display) !important;
    letter-spacing: var(--dxd-tracking-display);
  }

  h1, .display, .hero-title {
    font-size: var(--dxd-h1-size) !important;
    font-weight: var(--dxd-h1-weight) !important;
    line-height: var(--dxd-h1-line) !important;
  }
  h2, .section-title {
    font-size: var(--dxd-h2-size) !important;
    font-weight: var(--dxd-h2-weight) !important;
    line-height: var(--dxd-h2-line) !important;
  }
  h3 {
    font-size: var(--dxd-h3-size) !important;
    font-weight: var(--dxd-h3-weight) !important;
    line-height: var(--dxd-h3-line) !important;
  }
  h4 {
    font-size: var(--dxd-h4-size) !important;
    font-weight: var(--dxd-h4-weight) !important;
  }
  h5, h6 {
    font-size: var(--dxd-h4-size) !important;
    font-weight: 600 !important;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .eyebrow, [class*="eyebrow"] {
    font-size: var(--dxd-eyebrow-size) !important;
    letter-spacing: var(--dxd-tracking-eyebrow) !important;
    text-transform: uppercase;
    font-weight: 500 !important;
  }
</style>
</head>
<body>
  <div id="gate" hidden role="dialog" aria-modal="true" aria-label="Investor Portal sign in — Threats Don't Wait">
    <div class="hero" aria-hidden="true">
      <iframe id="gate-bg" src="Threats Dont Wait.html" title="" tabindex="-1" scrolling="no"></iframe>
      <div class="hero-logo"><span class="mark">DEUS<span class="x">X</span>DEFENSE</span></div>
      <div class="hero-title">THREATS DON'T WAIT.</div>
    </div>
    <form class="panel" id="gate-form" autocomplete="off">
      <div class="title">SIGN IN</div>
      <input id="gate-password" type="password" autocomplete="current-password" autofocus required aria-label="Access code" placeholder="Access code" />
      <button type="submit">Enter</button>
      <div class="error" id="gate-error" role="alert" aria-live="polite"></div>
    </form>
  </div>
  <header>
    <div class="brand">
      <img src="dxd-logo-white.png" alt="" class="brand-logo" aria-hidden="true"/>
      <span><strong>Deus <span class="brand-x">X</span> Defense</strong><span class="brand-tag"> &middot; Investor Portal</span></span>
    </div>
    <nav class="tabs" id="tabs" role="tablist"></nav>
  </header>
  <main id="main">
    <div class="loading">Loading…</div>
  </main>

  <script>
    // Simple client-side access gate. Not cryptographic security — intended
    // to keep the portal out of casual / unauthenticated view.
    const ACCESS_CODE = "dxd2026";
    const STORAGE_KEY = "dxd-portal-auth";

    const gateEl = document.getElementById("gate");
    const gateForm = document.getElementById("gate-form");
    const gatePassword = document.getElementById("gate-password");
    const gateError = document.getElementById("gate-error");

    function showPortal() {
      gateEl.remove();
      initPortal();
    }

    function showGate() {
      gateEl.hidden = false;
      // Defer focus so it works after layout
      setTimeout(() => gatePassword.focus(), 0);
      // Strip text content from the hero iframe, leaving only the radar/canvas/svg.
      const bg = document.getElementById("gate-bg");
      if (bg) {
        const sanitize = () => {
          try {
            const doc = bg.contentDocument;
            if (!doc) return;
            const style = doc.createElement("style");
            style.textContent = `
              body { background: #000 !important; overflow: hidden !important; }
              h1, h2, h3, h4, h5, h6, p, li, blockquote, span, small, strong, em, label, button, a, figcaption, time, address {
                color: transparent !important;
                text-shadow: none !important;
                background: transparent !important;
                border: 0 !important;
                box-shadow: none !important;
                visibility: hidden !important;
              }
            `;
            (doc.head || doc.documentElement).appendChild(style);
          } catch (_) { /* cross-origin or not ready */ }
        };
        bg.addEventListener("load", () => {
          sanitize();
          // Bundle replaces document after load; re-apply a few times.
          let n = 0;
          const iv = setInterval(() => { sanitize(); if (++n > 20) clearInterval(iv); }, 250);
        });
      }
    }

    if (sessionStorage.getItem(STORAGE_KEY) === "1") {
      showPortal();
    } else {
      showGate();
      gateForm.addEventListener("submit", (e) => {
        e.preventDefault();
        if (gatePassword.value === ACCESS_CODE) {
          try { sessionStorage.setItem(STORAGE_KEY, "1"); } catch (_) {}
          showPortal();
        } else {
          gateError.textContent = "Incorrect access code.";
          gatePassword.select();
        }
      });
    }

    function initPortal() {
    // Each tab maps a label to a file in the repo root.
    // Files are loaded lazily on first activation, then cached in the DOM
    // so switching tabs is instant and no single response is "too big".
    // Each tab maps a label to a source file (and optional in-page hash).
    // Tabs that share the same `src` reuse a single iframe instance —
    // switching just updates the iframe's hash so the inner page can
    // navigate without reloading. The Q1 2026 quarterly portal
    // (`index 2.html`) listens for hashchange and switches its own
    // sub-tabs accordingly.
    const TABS = [
      { id: "investor",     label: "CEO Letter",                       src: "index 2.html", hash: "letter" },
      { id: "origin",       label: "Origin",                           src: "Hi-Fi - Story.html" },
      { id: "team",         label: "Team",                             src: "deusx-leadership/leadership.html" },
      { id: "story",        label: "Story",                            src: "index 2.html", hash: "story" },
      { id: "product",      label: "Product",                          src: "Product Walkthrough/Immune System Scroller.html" },
      { id: "cuas",         label: "Atlas · Airspace Defense",         src: "CUAS/index.html" },
      { id: "pitch",        label: "Deus X Defense",                   src: "DxD Investor Pitch v2 — April 2026.html" },
      { id: "traction",     label: "Traction",                         src: "Traction.html" },
      { id: "financials",   label: "Financials",                       src: "index 2.html", hash: "financials" },
      { id: "dataroom",     label: "Data Room",                        src: "index 2.html", hash: "dataroom" },
      { id: "appendix",     label: "Appendix",                         src: "index 2.html", hash: "appendix" }
    ];

    const tabsEl = document.getElementById("tabs");
    const mainEl = document.getElementById("main");
    // Frames are keyed by `src` so multiple tabs that share a source file
    // reuse the same iframe instance.
    const frames = new Map();

    function activate(id) {
      const tab = TABS.find(t => t.id === id);
      if (!tab) return;

      // Update tab buttons
      for (const btn of tabsEl.querySelectorAll(".tab")) {
        btn.classList.toggle("active", btn.dataset.id === id);
        btn.setAttribute("aria-selected", btn.dataset.id === id ? "true" : "false");
      }

      // Lazy-create iframe on first activation of this src
      let frame = frames.get(tab.src);
      const targetSrc = tab.src + (tab.hash ? "#" + tab.hash : "");
      if (!frame) {
        frame = document.createElement("iframe");
        frame.title = tab.label;
        frame.src = targetSrc;
        frame.loading = "lazy";
        mainEl.appendChild(frame);
        frames.set(tab.src, frame);
      } else if (tab.hash) {
        // Same iframe, different sub-tab — update hash without reloading.
        try {
          const cw = frame.contentWindow;
          if (cw && cw.location && cw.location.hash !== "#" + tab.hash) {
            cw.location.hash = tab.hash;
          }
        } catch (_) {
          // Fallback: setting src with a new hash on same document doesn't reload.
          frame.src = targetSrc;
        }
      }

      // Show only the active iframe
      for (const [src, f] of frames) {
        f.classList.toggle("active", src === tab.src);
      }

      // Notify the active iframe it just became visible so it can replay
      // any "intro" animations (e.g. the deck nav-controls pulse).
      const notify = () => {
        try { frame.contentWindow && frame.contentWindow.postMessage({ type: "dxd:tab-activated", id }, "*"); } catch (_) {}
      };
      // Defer to next frame so the iframe is laid out before the message.
      requestAnimationFrame(notify);
      // And once more after the iframe finishes loading the first time.
      frame.addEventListener("load", notify, { once: true });

      // Reflect in URL hash for shareable links
      if (location.hash.slice(1) !== id) {
        history.replaceState(null, "", "#" + id);
      }
    }

    // Build tab buttons
    for (const tab of TABS) {
      const btn = document.createElement("button");
      btn.className = "tab";
      btn.type = "button";
      btn.role = "tab";
      btn.dataset.id = tab.id;
      btn.textContent = tab.label;
      btn.addEventListener("click", () => activate(tab.id));
      tabsEl.appendChild(btn);
    }

    // Remove initial loading placeholder once a tab is shown
    const loadingEl = mainEl.querySelector(".loading");
    if (loadingEl) loadingEl.remove();

    // Initial selection from URL hash, else first tab
    const initial = TABS.find(t => t.id === location.hash.slice(1)) ? location.hash.slice(1) : TABS[0].id;
    activate(initial);

    window.addEventListener("hashchange", () => {
      const id = location.hash.slice(1);
      if (TABS.find(t => t.id === id)) activate(id);
    });
    }
  </script>
</body>
</html>
