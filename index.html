<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deus X Defense &middot; Investor Portal</title>
  <link rel="canonical" href="https://investor.deusxdefense.com/" />
  <meta property="og:url" content="https://investor.deusxdefense.com/" />
  <script>
    (function() {
      const CANONICAL_ORIGIN = "https://investor.deusxdefense.com";
      if (/\.railway\.app$/i.test(window.location.hostname)) {
        window.location.replace(
          CANONICAL_ORIGIN +
          window.location.pathname +
          window.location.search +
          window.location.hash
        );
      }
    })();
  </script>
  <style>
    :root {
      --bg: #0b0d10;
      --panel: #14181d;
      --border: #232a32;
      --text: #e8ecf1;
      --muted: #8a93a0;
      --accent: #C8102E;
      --accent-bg: #1a1f26;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    header {
      flex: 0 0 auto;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px 4px;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .brand img.brand-logo {
      height: 22px;
      width: auto;
      display: block;
    }
    .brand strong { color: var(--text); font-weight: 700; }
    .brand .brand-x { color: #C8102E; font-weight: 700; }
    nav.tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      padding: 8px 12px 0;
    }
    .tab {
      appearance: none;
      background: transparent;
      color: var(--muted);
      border: 1px solid transparent;
      border-bottom: none;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-top-left-radius: 6px;
      border-top-right-radius: 6px;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
    }
    .tab:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .tab.active {
      color: var(--accent);
      background: var(--accent-bg);
      border-color: var(--border);
      position: relative;
      top: 1px;
    }
    main {
      flex: 1 1 auto;
      position: relative;
      background: var(--bg);
    }
    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
      display: none;
    }
    iframe.active { display: block; }
    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 14px;
      pointer-events: none;
    }
    /* ── Mobile portal shell (≤720px) ──
       Tabs become a horizontally-scrollable strip so all 8 stay on a
       single row instead of stacking 3-deep and crowding the iframe.
       The brand line shrinks and the iframe gets the reclaimed space. */
    @media (max-width: 720px) {
      .brand {
        padding: 8px 14px 2px;
        font-size: 11px;
        letter-spacing: 0.08em;
        gap: 8px;
        flex-wrap: nowrap;
        overflow: hidden;
        white-space: nowrap;
      }
      .brand img.brand-logo { height: 18px; }
      .brand .brand-tag { display: none; }
      nav.tabs {
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        padding: 6px 8px 0;
        scrollbar-width: none;
      }
      nav.tabs::-webkit-scrollbar { display: none; }
      .tab {
        padding: 8px 12px;
        font-size: 12px;
        white-space: nowrap;
        flex: 0 0 auto;
      }
    }
    @media (max-width: 480px) {
      .brand { padding: 6px 12px 0; font-size: 10px; gap: 6px; }
      .brand img.brand-logo { height: 16px; }
      .tab { padding: 7px 10px; font-size: 11px; }
    }
    /* Sign-in gate — "Threats Don't Wait" format */
    #gate {
      position: fixed;
      inset: 0;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    #gate .hero {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #gate .hero iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
      pointer-events: auto;
    }
    /* Inline animated radar (replaces iframe) */
    #gate .gate-radar {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }
    /* SVG element transforms compose with native attribute transforms.
       Native SVG default rotation pivot is the element's local (0,0) —
       which inside the translated <g transform="translate(600 400)">
       is exactly the radar center. No transform-box gymnastics needed. */
    #gate .gate-radar .gr-sweep {
      animation: gr-rotate 4.2s linear infinite;
    }
    @keyframes gr-rotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    #gate .gate-radar .gr-pulse {
      animation: gr-pulse 4.2s ease-out infinite;
      opacity: 0;
    }
    #gate .gate-radar .gr-pulse-b { animation-delay: 1.4s; }
    #gate .gate-radar .gr-pulse-c { animation-delay: 2.8s; }
    @keyframes gr-pulse {
      0%   { transform: scale(0.05); opacity: 0; }
      8%   { opacity: 0.85; }
      100% { transform: scale(8);    opacity: 0; }
    }
    /* Drone tracks: each <g class="gr-track"> orbits the radar center.
       Drone ride along their parent track, with a slight tilt animation. */
    #gate .gate-radar .gr-track {
      animation: gr-orbit var(--orbit, 22s) linear infinite;
      animation-delay: var(--ostart, 0s);
      transform-origin: 0 0;
    }
    #gate .gate-radar .gr-track.rev { animation-direction: reverse; }
    @keyframes gr-orbit {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    /* Drone glyph itself rotates against the orbit so it stays heading-aligned
       to its motion vector, not pointing back at center. */
    #gate .gate-radar .gr-drone {
      animation: gr-drone-tilt 6s ease-in-out infinite;
    }
    @keyframes gr-drone-tilt {
      0%, 100% { transform: rotate(-4deg); }
      50%      { transform: rotate(4deg); }
    }
    /* Track-ID labels counter-rotate against their parent .gr-track so the
       text stays upright through the full 360° orbit (otherwise IDs read
       upside-down past the bottom of the sweep). Same orbit duration +
       delay as the parent, but reverse direction cancels the rotation. */
    #gate .gate-radar .gr-label {
      animation: gr-orbit var(--orbit, 22s) linear infinite;
      animation-delay: var(--ostart, 0s);
      animation-direction: reverse;
      transform-origin: 0 0;
    }
    #gate .gate-radar .gr-track.rev .gr-label { animation-direction: normal; }
    /* Track lock-on box around each drone — pulses red */
    #gate .gate-radar .gr-lock {
      animation: gr-lock 1.6s ease-in-out infinite;
      transform-origin: center;
    }
    @keyframes gr-lock {
      0%, 100% { opacity: 0.35; }
      50%      { opacity: 1; }
    }
    /* Cursor-following target reticle (HTML overlay) */
    #gate .gate-reticle {
      position: absolute;
      top: 0; left: 0;
      width: 92px; height: 92px;
      transform: translate3d(-9999px, -9999px, 0);
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      transition: opacity 200ms ease;
      mix-blend-mode: screen;
      will-change: transform;
    }
    #gate .gate-reticle.live { opacity: 1; }
    #gate .gate-reticle svg { width: 100%; height: 100%; display: block; overflow: visible; }
    #gate .gate-reticle .ret-ring {
      animation: ret-pulse 1.6s ease-in-out infinite;
      transform-origin: center;
    }
    @keyframes ret-pulse {
      0%, 100% { transform: scale(1);    opacity: 0.85; }
      50%      { transform: scale(1.08); opacity: 1; }
    }
    #gate .gate-reticle .ret-spin { animation: ret-spin 6s linear infinite; transform-origin: center; }
    @keyframes ret-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    #gate .gate-reticle .ret-readout {
      font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      fill: #FF506E;
      text-transform: uppercase;
    }
    @media (prefers-reduced-motion: reduce) {
      #gate .gate-radar .gr-sweep,
      #gate .gate-radar .gr-pulse,
      #gate .gate-radar .gr-track,
      #gate .gate-radar .gr-drone,
      #gate .gate-radar .gr-lock,
      #gate .gate-radar .gr-label,
      #gate .gate-reticle .ret-ring,
      #gate .gate-reticle .ret-spin { animation: none; }
    }
    /* Vignette to suppress any tagline/subtext rendered inside the hero iframe */
    #gate .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0) 50%, rgba(0,0,0,0.95) 65%, #000 72%),
        radial-gradient(ellipse at center, rgba(0,0,0,0) 30%, rgba(0,0,0,0.6) 100%);
    }
    #gate .hero-title {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 6vh;
      z-index: 1;
      text-align: center;
      font-family: Impact, "Haettenschweiler", "Arial Narrow Bold", sans-serif;
      font-size: clamp(36px, 7vw, 88px);
      letter-spacing: -1px;
      color: #FFFFFF;
      text-shadow: 0 2px 24px rgba(0,0,0,0.8);
      pointer-events: none;
      line-height: 1;
    }
    #gate .hero-logo {
      position: absolute;
      left: 0;
      right: 0;
      top: 5vh;
      z-index: 1;
      text-align: center;
      pointer-events: none;
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      letter-spacing: 0.42em;
      font-weight: 600;
      font-size: clamp(12px, 1.4vw, 16px);
      text-transform: uppercase;
      text-shadow: 0 2px 12px rgba(0,0,0,0.8);
    }
    #gate .hero-logo .mark {
      display: inline-flex;
      align-items: center;
      gap: 0.6em;
    }
    #gate .hero-logo .x {
      color: #C8102E;
      font-family: Impact, "Haettenschweiler", "Arial Narrow Bold", sans-serif;
      font-size: 1.5em;
      letter-spacing: 0;
      line-height: 1;
      transform: translateY(-1px);
    }
    #gate .panel {
      pointer-events: auto;
    }
    #gate .panel {
      position: relative;
      z-index: 2;
      width: min(360px, 90vw);
      padding: 22px 22px 20px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(200, 16, 46, 0.45);
      border-radius: 4px;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }
    #gate .eyebrow {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #FF506E;
      text-align: center;
      margin: 0 0 10px;
    }
    #gate .title {
      font-family: Impact, "Haettenschweiler", "Arial Narrow Bold", sans-serif;
      font-size: 28px;
      letter-spacing: -0.5px;
      color: #FFFFFF;
      text-align: center;
      margin: 0 0 18px;
      line-height: 1;
    }
    #gate label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #aaaaaa;
      margin: 0 0 6px;
    }
    #gate input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      background: #000000;
      color: #FFFFFF;
      border: 1px solid #3a3a3a;
      border-radius: 2px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    #gate input[type="password"]:focus { border-color: #C8102E; }
    #gate button {
      margin-top: 12px;
      width: 100%;
      padding: 11px 12px;
      background: #C8102E;
      color: #FFFFFF;
      border: 0;
      border-radius: 2px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
    }
    #gate button:hover { background: #E01933; }
    #gate .error {
      margin-top: 10px;
      min-height: 16px;
      font-size: 12px;
      color: #FF506E;
      text-align: center;
    }
  </style>
<!-- DXD-FONT-STANDARDIZATION -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700;800&family=Tomorrow:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&display=swap" rel="stylesheet">
<style id="dxd-font-standardization">
  :root {
    --dxd-font-display: "Tomorrow", "Inter Tight", system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --dxd-font-body:    "Inter Tight", "Tomorrow", system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --dxd-font-mono:    "JetBrains Mono", "Menlo", "Consolas", monospace;

    /* Standardized type scale (anchored to team page hero) */
    --dxd-h1-size: clamp(36px, 5.2vw, 76px);
    --dxd-h2-size: clamp(28px, 3.4vw, 48px);
    --dxd-h3-size: clamp(20px, 2vw, 28px);
    --dxd-h4-size: clamp(16px, 1.4vw, 20px);
    --dxd-body-size: clamp(15px, 1.05vw, 17px);
    --dxd-small-size: 13px;
    --dxd-eyebrow-size: 12px;

    --dxd-h1-weight: 400;
    --dxd-h2-weight: 400;
    --dxd-h3-weight: 500;
    --dxd-h4-weight: 600;
    --dxd-body-weight: 400;

    --dxd-h1-line: 0.98;
    --dxd-h2-line: 1.05;
    --dxd-h3-line: 1.15;
    --dxd-body-line: 1.55;

    --dxd-tracking-display: -0.02em;
    --dxd-tracking-eyebrow: 0.18em;
  }

  html, body, p, li, td, th, input, textarea, select, button, label,
  blockquote, figcaption, dd, dt {
    font-family: var(--dxd-font-body) !important;
    font-size: var(--dxd-body-size);
    line-height: var(--dxd-body-line);
  }

  h1, h2, h3, h4, h5, h6,
  .display, .headline, .hero-title, .section-title, .eyebrow, .nav-cta,
  .tab, .brand, .logo, .card-role {
    font-family: var(--dxd-font-display) !important;
    letter-spacing: var(--dxd-tracking-display);
  }

  h1, .display, .hero-title {
    font-size: var(--dxd-h1-size) !important;
    font-weight: var(--dxd-h1-weight) !important;
    line-height: var(--dxd-h1-line) !important;
  }
  h2, .section-title {
    font-size: var(--dxd-h2-size) !important;
    font-weight: var(--dxd-h2-weight) !important;
    line-height: var(--dxd-h2-line) !important;
  }
  h3 {
    font-size: var(--dxd-h3-size) !important;
    font-weight: var(--dxd-h3-weight) !important;
    line-height: var(--dxd-h3-line) !important;
  }
  h4 {
    font-size: var(--dxd-h4-size) !important;
    font-weight: var(--dxd-h4-weight) !important;
  }
  h5, h6 {
    font-size: var(--dxd-h4-size) !important;
    font-weight: 600 !important;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .eyebrow, [class*="eyebrow"] {
    font-size: var(--dxd-eyebrow-size) !important;
    letter-spacing: var(--dxd-tracking-eyebrow) !important;
    text-transform: uppercase;
    font-weight: 500 !important;
  }

  code, pre, kbd, samp, tt, .mono, [class*="mono"] {
    font-family: var(--dxd-font-mono) !important;
  }
</style>
</head>
<body>
  <div id="gate" hidden role="dialog" aria-modal="true" aria-label="Investor Portal sign in — Threats Don't Wait">
    <div class="hero" aria-hidden="true">
      <svg id="gate-radar" class="gate-radar" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="gr-vignette" cx="50%" cy="50%" r="65%">
            <stop offset="0%"  stop-color="#000" stop-opacity="0"/>
            <stop offset="70%" stop-color="#000" stop-opacity="0.55"/>
            <stop offset="100%" stop-color="#000" stop-opacity="1"/>
          </radialGradient>
          <linearGradient id="gr-sweep" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
            <stop offset="0%"  stop-color="#FF1F3A" stop-opacity="0.85"/>
            <stop offset="60%" stop-color="#FF1F3A" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#FF1F3A" stop-opacity="0"/>
          </linearGradient>
          <radialGradient id="gr-glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FF506E" stop-opacity="0.95"/>
            <stop offset="60%" stop-color="#FF506E" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#FF506E" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <!-- backdrop grid -->
        <rect width="1200" height="800" fill="#000"/>
        <g opacity="0.18" stroke="#3a0a10" stroke-width="0.6">
          <path d="M0 100 H1200 M0 200 H1200 M0 300 H1200 M0 400 H1200 M0 500 H1200 M0 600 H1200 M0 700 H1200"/>
          <path d="M100 0 V800 M200 0 V800 M300 0 V800 M400 0 V800 M500 0 V800 M600 0 V800 M700 0 V800 M800 0 V800 M900 0 V800 M1000 0 V800 M1100 0 V800"/>
        </g>

        <!-- radar -->
        <g transform="translate(600 400)">
          <!-- concentric range rings -->
          <g fill="none" stroke="#C8102E" stroke-width="1.2">
            <circle r="320" opacity="0.30"/>
            <circle r="240" opacity="0.28"/>
            <circle r="180" opacity="0.24"/>
            <circle r="120" opacity="0.20"/>
            <circle r="60"  opacity="0.16"/>
          </g>
          <!-- range labels -->
          <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="9" fill="#5a0e18" letter-spacing="0.18em">
            <text x="62"  y="-3">2KM</text>
            <text x="122" y="-3">4KM</text>
            <text x="182" y="-3">6KM</text>
            <text x="242" y="-3">8KM</text>
          </g>
          <!-- expanding pulse rings -->
          <circle class="gr-pulse gr-pulse-a" r="40" fill="none" stroke="#FF1F3A" stroke-width="1.5"/>
          <circle class="gr-pulse gr-pulse-b" r="40" fill="none" stroke="#FF1F3A" stroke-width="1.5"/>
          <circle class="gr-pulse gr-pulse-c" r="40" fill="none" stroke="#FF1F3A" stroke-width="1.5"/>
          <!-- crosshair -->
          <g stroke="#5a0e18" stroke-width="0.8" opacity="0.6">
            <line x1="-340" y1="0" x2="340" y2="0"/>
            <line x1="0" y1="-340" x2="0" y2="340"/>
          </g>
          <!-- cardinal ticks -->
          <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="10" fill="#7a1220" letter-spacing="0.2em" text-anchor="middle">
            <text y="-330">N</text>
            <text y="345">S</text>
            <text x="-340" y="3" text-anchor="end">W</text>
            <text x="340" y="3" text-anchor="start">E</text>
          </g>
          <!-- rotating sweep wedge (rotates around its own (0,0) which IS center) -->
          <g class="gr-sweep">
            <path d="M0,0 L320,-90 A320,320 0 0 1 320,90 Z" fill="url(#gr-sweep)"/>
            <line x1="0" y1="0" x2="320" y2="0" stroke="#FF1F3A" stroke-width="1.4" opacity="0.95"/>
          </g>

          <!-- ── tracked drones orbiting at different radii/speeds ── -->
          <!-- Drone 1: outer ring, slow CW -->
          <g class="gr-track" style="--orbit:26s; --ostart:-3s">
            <g transform="translate(280 0)">
              <g class="gr-drone">
                <!-- drone glyph: body + 4 rotor circles -->
                <circle cx="0" cy="0" r="3" fill="#FF506E"/>
                <line x1="-9" y1="-9" x2="9" y2="9"  stroke="#FF506E" stroke-width="1.2"/>
                <line x1="-9" y1="9"  x2="9" y2="-9" stroke="#FF506E" stroke-width="1.2"/>
                <circle cx="-9" cy="-9" r="2.2" fill="none" stroke="#FF506E" stroke-width="1.2"/>
                <circle cx="9"  cy="-9" r="2.2" fill="none" stroke="#FF506E" stroke-width="1.2"/>
                <circle cx="-9" cy="9"  r="2.2" fill="none" stroke="#FF506E" stroke-width="1.2"/>
                <circle cx="9"  cy="9"  r="2.2" fill="none" stroke="#FF506E" stroke-width="1.2"/>
              </g>
              <!-- lock-on box -->
              <g class="gr-lock" fill="none" stroke="#FF1F3A" stroke-width="1">
                <path d="M -16 -16 L -10 -16 M -16 -16 L -16 -10"/>
                <path d="M  16 -16 L  10 -16 M  16 -16 L  16 -10"/>
                <path d="M -16  16 L -10  16 M -16  16 L -16  10"/>
                <path d="M  16  16 L  10  16 M  16  16 L  16  10"/>
              </g>
              <!-- track id label (counter-rotates to stay upright) -->
              <g class="gr-label">
                <text x="22" y="-14" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="9" fill="#FF506E" letter-spacing="0.18em">TRK-014</text>
              </g>
            </g>
          </g>

          <!-- Drone 2: mid ring, faster CCW -->
          <g class="gr-track rev" style="--orbit:18s; --ostart:-7s">
            <g transform="translate(190 0)">
              <g class="gr-drone">

      <!-- cursor-following target reticle -->
      <div class="gate-reticle" id="gate-reticle" aria-hidden="true">
        <svg viewBox="-50 -50 100 100" xmlns="http://www.w3.org/2000/svg">
          <!-- spinning outer dashed ring -->
          <circle class="ret-spin" r="38" fill="none" stroke="#FF1F3A" stroke-width="0.8" stroke-dasharray="3 5" opacity="0.7"/>

          <g class="ret-ring">

            <path d="M -30 -22 L -30 -30 L -22 -30" fill="none" stroke="#FF506E" stroke-width="1.4"/>

          <line x1="0" y1="-44" x2="0" y2="-10" stroke="#FF506E" stroke-width="1"/>

    <form class="panel" id="gate-form" autocomplete="off">
      <div class="title">SIGN IN</div>
      <input id="gate-password" type="password" autocomplete="current-password" autofocus required aria-label="Access code" placeholder="Access code" />
      <button type="submit">Enter</button>
      <div class="error" id="gate-error" role="alert" aria-live="polite"></div>
    </form>
  </div>
  <header>
    <div class="brand">
      <img src="dxd-logo-white.png" alt="" class="brand-logo" aria-hidden="true"/>
      <span><strong>Deus <span class="brand-x">X</span> Defense</strong><span class="brand-tag"> &middot; Investor Portal</span></span>
    </div>
    <nav class="tabs" id="tabs" role="tablist"></nav>
  </header>
  <main id="main">
    <div class="loading">Loading…</div>
  </main>

  <script>
    // Simple client-side access gate. Not cryptographic security — intended
    // to keep the portal out of casual / unauthenticated view.
    const ACCESS_CODE = "dxd2026";
    const STORAGE_KEY = "dxd-portal-auth";

    const gateEl = document.getElementById("gate");
    const gateForm = document.getElementById("gate-form");
    const gatePassword = document.getElementById("gate-password");
    const gateError = document.getElementById("gate-error");
    const headerEl = document.querySelector("header");
    const portalMainEl = document.getElementById("main");
    let portalInitialized = false;

    function setPortalLocked(isLocked) {
      gateEl.hidden = !isLocked;
      headerEl.hidden = isLocked;
      portalMainEl.hidden = isLocked;
      headerEl.inert = isLocked;
      portalMainEl.inert = isLocked;
      if (isLocked) {
        gateError.textContent = "";
        gatePassword.value = "";
      }
    }

    function showPortal(opts) {
      setPortalLocked(false);
      // On a fresh sign-in (not a session resume), always land on the
      // CEO Letter regardless of any stale hash in the URL.
      if (opts && opts.freshSignIn) {
        try { history.replaceState(null, "", location.pathname + location.search); } catch (_) {}
      }
      if (!portalInitialized) {
        initPortal();
        portalInitialized = true;
      }
    }

    function showGate() {
      setPortalLocked(true);
      // Defer focus so it works after layout
      setTimeout(() => gatePassword.focus(), 0);
      initGateReticle();
    }

    function lockPortal() {
      try { sessionStorage.removeItem(STORAGE_KEY); } catch (_) {}
      showGate();
    }

    // Cursor-following target reticle (lerps for slight tracker lag)
    function initGateReticle() {
      const ret = document.getElementById("gate-reticle");
      if (!ret || ret._init) return;
      ret._init = true;
      let tx = -200, ty = -200, x = -200, y = -200, raf = 0, live = false;
      const tick = () => {
        x += (tx - x) * 0.18;
        y += (ty - y) * 0.18;
        ret.style.transform = `translate3d(${x - 46}px, ${y - 46}px, 0)`;
        raf = requestAnimationFrame(tick);
      };
      gateEl.addEventListener("mousemove", (e) => {
        const r = gateEl.getBoundingClientRect();
        tx = e.clientX - r.left;
        ty = e.clientY - r.top;
        if (!live) { live = true; ret.classList.add("live"); x = tx; y = ty; }
        if (!raf) raf = requestAnimationFrame(tick);
      });
      gateEl.addEventListener("mouseleave", () => {
        live = false;
        ret.classList.remove("live");
      });
    }

    if (sessionStorage.getItem(STORAGE_KEY) === "1") {
      showPortal();
    } else {
      showGate();
    }

    gateForm.addEventListener("submit", (e) => {
      e.preventDefault();
      if (gatePassword.value === ACCESS_CODE) {
        try { sessionStorage.setItem(STORAGE_KEY, "1"); } catch (_) {}
        showPortal({ freshSignIn: true });
      } else {
        gateError.textContent = "Incorrect access code.";
        gatePassword.select();
      }
    });

    // pagehide must only clear the session token — calling showGate() here races
    // with a successful sign-in and immediately bounces the shell back to the gate
    // (fixed in d8a1676; re-broken when cf5b877 reverted to sessionStorage).
    window.addEventListener("pagehide", () => {
      try { sessionStorage.removeItem(STORAGE_KEY); } catch (_) {}
    });
    window.addEventListener("pageshow", () => {
      if (sessionStorage.getItem(STORAGE_KEY) !== "1") {
        showGate();
      }
    });

    function initPortal() {
    // Each tab maps a label to a single source file at the repo root.
    // Files are loaded lazily on first activation, then cached in the
    // DOM so switching tabs is instant and no single response is
    // "too big". Each tab now owns its own file (the legacy
    // `index 2.html` monolith was split into ceo-letter.html,
    // the-story.html, financials.html, appendix.html, data-room.html).
    const TABS = [
      { id: "investor",     label: "CEO Letter",                       src: "ceo-letter.html" },
      { id: "pitch",        label: "Deus X Defense",                   src: "deus-x-defense.html" },
      { id: "pitch-v2",     label: "Deus X Defense v2",                src: "deus-x-defense-v2.html" },
      { id: "team",         label: "Team",                             src: "team.html" },
      { id: "story",        label: "The Story",                        src: "the-story.html" },
      { id: "origin",       label: "The Origin",                       src: "the-origin.html" },
      { id: "product",      label: "Product",                          src: "product.html" },
      { id: "cuas",         label: "Atlas · Airspace Defense",         src: "atlas.html" },
      { id: "financials",   label: "Financials",                       src: "financials.html" },
      { id: "traction",     label: "Traction",                         src: "traction.html" },
      { id: "appendix",     label: "Appendix",                         src: "appendix.html" },
      { id: "dataroom",     label: "Data Room",                        src: "data-room.html" }
    ];

    const tabsEl = document.getElementById("tabs");
    const mainEl = document.getElementById("main");
    // Frames are keyed by `src` so multiple tabs that share a source file
    // reuse the same iframe instance.
    const frames = new Map();

    function activate(id) {
      const tab = TABS.find(t => t.id === id);
      if (!tab) return;

      // Update tab buttons
      for (const btn of tabsEl.querySelectorAll(".tab")) {
        btn.classList.toggle("active", btn.dataset.id === id);
        btn.setAttribute("aria-selected", btn.dataset.id === id ? "true" : "false");
      }

      // Lazy-create iframe on first activation of this src
      let frame = frames.get(tab.src);
      const targetSrc = tab.src + (tab.hash ? "#" + tab.hash : "");
      if (!frame) {
        frame = document.createElement("iframe");
        frame.title = tab.label;
        frame.src = targetSrc;
        frame.loading = "lazy";
        mainEl.appendChild(frame);
        frames.set(tab.src, frame);
      } else if (tab.hash) {
        // Same iframe, different sub-tab — update hash without reloading.
        try {
          const cw = frame.contentWindow;
          if (cw && cw.location && cw.location.hash !== "#" + tab.hash) {
            cw.location.hash = tab.hash;
          }
        } catch (_) {
          // Fallback: setting src with a new hash on same document doesn't reload.
          frame.src = targetSrc;
        }
      }

      // Show only the active iframe
      for (const [src, f] of frames) {
        f.classList.toggle("active", src === tab.src);
      }

      // Notify the active iframe it just became visible so it can replay
      // any "intro" animations (e.g. the deck nav-controls pulse).
      const notify = () => {
        try { frame.contentWindow && frame.contentWindow.postMessage({ type: "dxd:tab-activated", id }, "*"); } catch (_) {}
      };
      // Defer to next frame so the iframe is laid out before the message.
      requestAnimationFrame(notify);
      // And once more after the iframe finishes loading the first time.
      frame.addEventListener("load", notify, { once: true });

      // Reflect in URL hash for shareable links
      if (location.hash.slice(1) !== id) {
        history.replaceState(null, "", "#" + id);
      }
    }

    // Build tab buttons
    for (const tab of TABS) {
      const btn = document.createElement("button");
      btn.className = "tab";
      btn.type = "button";
      btn.role = "tab";
      btn.dataset.id = tab.id;
      btn.textContent = tab.label;
      btn.addEventListener("click", () => activate(tab.id));
      tabsEl.appendChild(btn);
    }

    // Remove initial loading placeholder once a tab is shown
    const loadingEl = mainEl.querySelector(".loading");
    if (loadingEl) loadingEl.remove();

    // Initial selection from URL hash, else first tab
    const initial = TABS.find(t => t.id === location.hash.slice(1)) ? location.hash.slice(1) : TABS[0].id;
    activate(initial);

    window.addEventListener("hashchange", () => {
      const id = location.hash.slice(1);
      if (TABS.find(t => t.id === id)) activate(id);
    });
    }
  </script>
