<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deus X Defense &middot; Investor Portal</title>
  <style>
    :root {
      --bg: #0b0d10;
      --panel: #14181d;
      --border: #232a32;
      --text: #e8ecf1;
      --muted: #8a93a0;
      --accent: #e0b04a;
      --accent-bg: #1a1f26;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    header {
      flex: 0 0 auto;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    .brand {
      padding: 12px 20px 4px;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .brand strong { color: var(--text); }
    nav.tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      padding: 8px 12px 0;
    }
    .tab {
      appearance: none;
      background: transparent;
      color: var(--muted);
      border: 1px solid transparent;
      border-bottom: none;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-top-left-radius: 6px;
      border-top-right-radius: 6px;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
    }
    .tab:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .tab.active {
      color: var(--accent);
      background: var(--accent-bg);
      border-color: var(--border);
      position: relative;
      top: 1px;
    }
    main {
      flex: 1 1 auto;
      position: relative;
      background: var(--bg);
    }
    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
      display: none;
    }
    iframe.active { display: block; }
    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 14px;
      pointer-events: none;
    }
    /* Sign-in gate — "Threats Don't Wait" format */
    #gate {
      position: fixed;
      inset: 0;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    #gate .hero {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    #gate .hero svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    #gate .panel {
      position: relative;
      z-index: 2;
      width: min(360px, 90vw);
      padding: 22px 22px 20px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(200, 16, 46, 0.45);
      border-radius: 4px;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      margin-top: 18vh;
    }
    #gate .eyebrow {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #FF506E;
      text-align: center;
      margin: 0 0 10px;
    }
    #gate .title {
      font-family: Impact, "Haettenschweiler", "Arial Narrow Bold", sans-serif;
      font-size: 28px;
      letter-spacing: -0.5px;
      color: #FFFFFF;
      text-align: center;
      margin: 0 0 18px;
      line-height: 1;
    }
    #gate label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #aaaaaa;
      margin: 0 0 6px;
    }
    #gate input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      background: #000000;
      color: #FFFFFF;
      border: 1px solid #3a3a3a;
      border-radius: 2px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    #gate input[type="password"]:focus { border-color: #C8102E; }
    #gate button {
      margin-top: 12px;
      width: 100%;
      padding: 11px 12px;
      background: #C8102E;
      color: #FFFFFF;
      border: 0;
      border-radius: 2px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
    }
    #gate button:hover { background: #E01933; }
    #gate .error {
      margin-top: 10px;
      min-height: 16px;
      font-size: 12px;
      color: #FF506E;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="gate" hidden role="dialog" aria-modal="true" aria-label="Investor Portal sign in — Threats Don't Wait">
    <div class="hero" aria-hidden="true">
      <svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <rect width="1200" height="800" fill="#000"></rect>
        <g transform="translate(600 400)">
          <circle r="240" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.35"></circle>
          <circle r="180" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.25"></circle>
          <circle r="120" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.2"></circle>
          <circle r="60" fill="none" stroke="#C8102E" stroke-width="1.5" opacity="0.15"></circle>
          <line x1="0" y1="0" x2="240" y2="0" stroke="#E01933" stroke-width="2"></line>
          <circle cx="120" cy="-70" r="6" fill="#FF506E"></circle>
        </g>
        <text x="60" y="720" font-family="Impact, sans-serif" font-size="72" fill="#FFFFFF" letter-spacing="-2">THREATS DON'T WAIT.</text>
      </svg>
    </div>
    <form class="panel" id="gate-form" autocomplete="off">
      <div class="eyebrow">Deus X Defense &middot; Investor Portal</div>
      <div class="title">SIGN IN</div>
      <label for="gate-password">Access code</label>
      <input id="gate-password" type="password" autocomplete="current-password" autofocus required />
      <button type="submit">Enter</button>
      <div class="error" id="gate-error" role="alert" aria-live="polite"></div>
    </form>
  </div>
  <header>
    <div class="brand"><strong>Deus X Defense</strong> &middot; Investor Portal</div>
    <nav class="tabs" id="tabs" role="tablist"></nav>
  </header>
  <main id="main">
    <div class="loading">Loading…</div>
  </main>

  <script>
    // Simple client-side access gate. Not cryptographic security — intended
    // to keep the portal out of casual / unauthenticated view.
    const ACCESS_CODE = "dxd2026";
    const STORAGE_KEY = "dxd-portal-auth";

    const gateEl = document.getElementById("gate");
    const gateForm = document.getElementById("gate-form");
    const gatePassword = document.getElementById("gate-password");
    const gateError = document.getElementById("gate-error");

    function showPortal() {
      gateEl.remove();
      initPortal();
    }

    function showGate() {
      gateEl.hidden = false;
      // Defer focus so it works after layout
      setTimeout(() => gatePassword.focus(), 0);
    }

    if (sessionStorage.getItem(STORAGE_KEY) === "1") {
      showPortal();
    } else {
      showGate();
      gateForm.addEventListener("submit", (e) => {
        e.preventDefault();
        if (gatePassword.value === ACCESS_CODE) {
          try { sessionStorage.setItem(STORAGE_KEY, "1"); } catch (_) {}
          showPortal();
        } else {
          gateError.textContent = "Incorrect access code.";
          gatePassword.select();
        }
      });
    }

    function initPortal() {
    // Each tab maps a label to a file in the repo root.
    // Files are loaded lazily on first activation, then cached in the DOM
    // so switching tabs is instant and no single response is "too big".
    const TABS = [
      { id: "story",        label: "Story",               src: "Hi-Fi - Story.html" },
      { id: "design2",      label: "Investor Information", src: "index 2.html" },
      { id: "pitch",        label: "Pitch",               src: "Pitch vAPR20.html" },
      { id: "architecture", label: "Product",              src: "DXD-Product-Architecture-4-2.html" }
    ];

    const tabsEl = document.getElementById("tabs");
    const mainEl = document.getElementById("main");
    const frames = new Map();

    function activate(id) {
      // Update tab buttons
      for (const btn of tabsEl.querySelectorAll(".tab")) {
        btn.classList.toggle("active", btn.dataset.id === id);
        btn.setAttribute("aria-selected", btn.dataset.id === id ? "true" : "false");
      }
      // Lazy-create iframe on first activation
      let frame = frames.get(id);
      if (!frame) {
        const tab = TABS.find(t => t.id === id);
        frame = document.createElement("iframe");
        frame.title = tab.label;
        frame.src = tab.src;
        frame.loading = "lazy";
        mainEl.appendChild(frame);
        frames.set(id, frame);
      }
      // Show only the active iframe
      for (const [tid, f] of frames) {
        f.classList.toggle("active", tid === id);
      }
      // Reflect in URL hash for shareable links
      if (location.hash.slice(1) !== id) {
        history.replaceState(null, "", "#" + id);
      }
    }

    // Build tab buttons
    for (const tab of TABS) {
      const btn = document.createElement("button");
      btn.className = "tab";
      btn.type = "button";
      btn.role = "tab";
      btn.dataset.id = tab.id;
      btn.textContent = tab.label;
      btn.addEventListener("click", () => activate(tab.id));
      tabsEl.appendChild(btn);
    }

    // Remove initial loading placeholder once a tab is shown
    const loadingEl = mainEl.querySelector(".loading");
    if (loadingEl) loadingEl.remove();

    // Initial selection from URL hash, else first tab
    const initial = TABS.find(t => t.id === location.hash.slice(1)) ? location.hash.slice(1) : TABS[0].id;
    activate(initial);

    window.addEventListener("hashchange", () => {
      const id = location.hash.slice(1);
      if (TABS.find(t => t.id === id)) activate(id);
    });
    }
  </script>
</body>
</html>
