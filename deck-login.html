<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet" />
  <meta name="referrer" content="no-referrer" />
  <title>Deck Sign In</title>
  <link rel="icon" type="image/png" href="dxd-logo-white.png" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #030303; color: #fff; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .shell {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      isolation: isolate;
    }
    .field {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 46%, rgba(200, 16, 46, 0.20), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(0,0,0,0) 36%),
        #030303;
    }
    .field::before {
      content: "";
      position: absolute;
      inset: -30%;
      background:
        repeating-linear-gradient(0deg, rgba(200, 16, 46, 0.12) 0 1px, transparent 1px 70px),
        repeating-linear-gradient(90deg, rgba(200, 16, 46, 0.10) 0 1px, transparent 1px 70px);
      transform: perspective(720px) rotateX(58deg) translateY(8%);
      transform-origin: center bottom;
      opacity: 0.52;
    }
    .field::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at center, transparent 0 34%, rgba(0,0,0,0.40) 72%, #000 100%),
        linear-gradient(to bottom, rgba(0,0,0,0) 48%, rgba(0,0,0,0.92) 88%);
    }
    .sweep {
      position: absolute;
      width: min(760px, 120vw);
      aspect-ratio: 1;
      border: 1px solid rgba(200, 16, 46, 0.28);
      border-radius: 50%;
      opacity: 0.8;
      animation: spin 7s linear infinite;
    }
    .sweep::before {
      content: "";
      position: absolute;
      inset: 50% 50% auto auto;
      width: 50%;
      height: 2px;
      background: linear-gradient(90deg, rgba(255, 80, 110, 0.95), rgba(255, 80, 110, 0));
      transform-origin: left center;
    }
    .sweep::after {
      content: "";
      position: absolute;
      inset: 18%;
      border: 1px solid rgba(200, 16, 46, 0.18);
      border-radius: 50%;
      box-shadow: 0 0 0 96px rgba(0,0,0,0), inset 0 0 60px rgba(200,16,46,0.08);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .brand {
      position: absolute;
      top: max(28px, env(safe-area-inset-top));
      left: 0;
      right: 0;
      z-index: 1;
      text-align: center;
      letter-spacing: 0.42em;
      font-size: clamp(11px, 1.4vw, 15px);
      font-weight: 700;
      text-transform: uppercase;
      color: rgba(255,255,255,0.92);
      text-shadow: 0 2px 16px rgba(0,0,0,0.85);
    }
    .brand .x {
      color: #C8102E;
      font-family: Impact, "Haettenschweiler", "Arial Narrow Bold", sans-serif;
      font-size: 1.5em;
      letter-spacing: 0;
      vertical-align: -0.08em;
    }
    .panel {
      position: relative;
      z-index: 2;
      width: min(380px, 92vw);
      padding: 24px 22px 21px;
      background: rgba(0, 0, 0, 0.64);
      border: 1px solid rgba(200, 16, 46, 0.50);
      border-radius: 4px;
      box-shadow: 0 26px 80px rgba(0,0,0,0.58), 0 0 0 1px rgba(255,255,255,0.04) inset;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .title {
      margin: 0 0 6px;
      font-family: Impact, "Haettenschweiler", "Arial Narrow Bold", sans-serif;
      font-size: clamp(30px, 8vw, 42px);
      line-height: 1;
      text-align: center;
      letter-spacing: 0;
    }
    .subtitle {
      margin: 0 0 20px;
      color: #FF506E;
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }
    input[type="password"] {
      width: 100%;
      min-height: 42px;
      padding: 10px 12px;
      background: #000;
      color: #fff;
      border: 1px solid #3a3a3a;
      border-radius: 2px;
      font: inherit;
      font-size: 14px;
      outline: none;
    }
    input[type="password"]:focus { border-color: #C8102E; box-shadow: 0 0 0 1px rgba(200,16,46,0.5); }
    input[type="password"]:disabled { opacity: 0.55; cursor: not-allowed; }
    button {
      width: 100%;
      min-height: 42px;
      margin-top: 12px;
      padding: 11px 12px;
      background: #C8102E;
      color: #fff;
      border: 0;
      border-radius: 2px;
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
    }
    button:hover { background: #E01933; }
    button:disabled { background: #555; cursor: not-allowed; }
    .error {
      min-height: 17px;
      margin-top: 10px;
      color: #FF506E;
      font-size: 12px;
      text-align: center;
    }
    .status {
      position: absolute;
      left: 0;
      right: 0;
      bottom: max(22px, env(safe-area-inset-bottom));
      z-index: 1;
      text-align: center;
      color: rgba(255,255,255,0.58);
      font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    @media (prefers-reduced-motion: reduce) {
      .sweep { animation: none; }
    }
  </style>
</head>
<body>
  <main class="shell" aria-label="Deck sign in">
    <div class="field" aria-hidden="true"></div>
    <div class="sweep" aria-hidden="true"></div>
    <div class="brand">DEUS <span class="x">X</span> DEFENSE</div>

    <form class="panel" id="gate-form" autocomplete="off" novalidate>
      <h1 class="title">SIGN IN</h1>
      <p class="subtitle">Investor Deck</p>
      <input id="gate-password" name="password" type="password" autocomplete="current-password" autofocus required aria-label="Access code" placeholder="Access code" />
      <button type="submit" id="gate-submit">Enter</button>
      <div class="error" id="gate-error" role="alert" aria-live="polite"></div>
    </form>

    <div class="status" aria-hidden="true">Deck access</div>
  </main>

  <script>
    (function () {
      const form = document.getElementById('gate-form');
      const pwd = document.getElementById('gate-password');
      const btn = document.getElementById('gate-submit');
      const err = document.getElementById('gate-error');
      let csrfToken = '';
      let lockoutTimer = null;

      async function refreshCsrfToken() {
        const res = await fetch('/api/csrf', {
          method: 'GET',
          credentials: 'same-origin',
          headers: { 'Accept': 'application/json' },
        });
        if (!res.ok) throw new Error(`CSRF request failed (${res.status})`);
        const data = await res.json();
        if (!data || typeof data.csrfToken !== 'string' || !data.csrfToken) {
          throw new Error('CSRF response missing token');
        }
        csrfToken = data.csrfToken;
        return csrfToken;
      }

      function formatWait(ms) {
        const total = Math.max(1, Math.ceil(ms / 1000));
        const minutes = Math.floor(total / 60);
        const seconds = total % 60;
        return `${minutes}:${String(seconds).padStart(2, '0')}`;
      }

      function startLockout(retryAfterMs) {
        const endsAt = Date.now() + Math.max(0, retryAfterMs || 5 * 60 * 1000);
        pwd.disabled = true;
        btn.disabled = true;
        if (lockoutTimer) clearInterval(lockoutTimer);
        const update = () => {
          const remaining = endsAt - Date.now();
          if (remaining <= 0) {
            clearInterval(lockoutTimer);
            lockoutTimer = null;
            pwd.disabled = false;
            btn.disabled = false;
            err.textContent = '';
            pwd.focus();
            return;
          }
          err.textContent = `Too many attempts. Try again in ${formatWait(remaining)}.`;
        };
        update();
        lockoutTimer = setInterval(update, 250);
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        err.textContent = '';
        if (!pwd.value) return;
        btn.disabled = true;
        try {
          if (!csrfToken) await refreshCsrfToken();
          const res = await fetch('/api/deck-login', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json', 'X-CSRF-Token': csrfToken },
            body: JSON.stringify({ password: pwd.value }),
          });
          let data = {};
          try { data = await res.json(); } catch (_) { data = {}; }

          if (res.ok && data.ok) {
            window.location.replace('/deck');
            return;
          }
          if (res.status === 429 || data.locked || data.attemptsRemaining === 0) {
            startLockout(data.retryAfterMs || 5 * 60 * 1000);
            return;
          }
          if (res.status === 403) {
            await refreshCsrfToken();
            err.textContent = 'Session expired. Please try again.';
            return;
          }
          err.textContent = data.attemptsRemaining === 1
            ? 'Incorrect access code. One attempt remaining.'
            : 'Incorrect access code.';
          pwd.select();
        } catch (error) {
          console.warn('Deck login request failed:', error);
          err.textContent = 'Network error. Please try again.';
        } finally {
          if (!pwd.disabled) btn.disabled = false;
        }
      });

      refreshCsrfToken().catch(() => {
        err.textContent = 'Unable to initialize secure session. Refresh and try again.';
      });
    })();
  </script>
</body>
</html>
