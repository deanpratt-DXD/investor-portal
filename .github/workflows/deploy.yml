name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
  REGION: ${{ vars.GCP_REGION }}
  RUNTIME_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (from source)
        run: |
          gcloud run deploy "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --source . \
            --service-account "$RUNTIME_SERVICE_ACCOUNT" \
            --allow-unauthenticated \
            --set-env-vars=NODE_ENV=production \
            --update-secrets=ACCESS_CODE=portal-access-code:latest,DECK_ACCESS_CODE=portal-deck-access-code:latest,SESSION_SECRET=portal-session-secret:latest \
            --quiet
